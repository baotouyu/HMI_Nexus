# HMI_Nexus runtime config
# 支持格式：
# - 布尔值：true / false / on / off / yes / no / 1 / 0
# - 大小值：字节数，或带单位的 512KB / 2MB / 1GB

log.console=true
log.file=true
log.color=true
log.level=info
log.file_path=logs/hmi.log
log.max_file_size=2MB
log.max_backup_files=5

# tag 规则支持精确匹配和前缀匹配：
# - log.tag.net=warn        -> net.http / net.mqtt / net.ws 都会命中
# - log.tag.net.http=error  -> 只对 net.http 更严格
# 注意：全局等级优先级更高，tag 只能更严格，不能放宽全局门槛
# log.tag.net=debug
# log.tag.net.http=error
# log.tag.ui.home=warn

# UI / 显示
# - framebuffer 后端会直接使用 /dev/fb0 当前出图模式，width/height 不会改面板时序
# - rotation=90/180/270 在 D211 + GE2D + DMA draw buffer 可用时走硬件旋转
# - draw_buffer_lines 主要给分块渲染后端预留，当前这条 D211 framebuffer direct 路径不使用
ui.display.width=800
ui.display.height=480
ui.display.dpi=160
ui.display.draw_buffer_lines=40
ui.display.framebuffer=/dev/fb0
ui.display.backend=auto
ui.display.rotation=0
# 可选：home / ge2d_diagnostics / lvgl_widgets_demo / lvgl_benchmark_demo
ui.start_screen=lvgl_widgets_demo
ui.accel.backend=auto
# 性能统计：
# - 每个统计窗口输出 pump 次数、实际 present 次数、handler/flush 平均耗时和峰值
# - 便于区分卡在 LVGL 绘制，还是卡在 framebuffer flush
ui.perf.enabled=true
ui.perf.report_interval_ms=1000

# 触摸输入
# - device=auto 时会自动扫描 /dev/input/event*
# - 如果坐标方向不对，可尝试 swap_axes / invert_x / invert_y
# - 这三个参数只修正“触摸芯片原始坐标方向”，不负责跟随显示 rotation
# - 现在显示旋转由 LVGL 内部处理，所以触摸正常时这三项一般都保持 false
# - use_calibration=false 时，程序会自动读取触摸设备上报的 min/max 量程
# - 只有 use_calibration=true 时，下面四个 min/max 才会参与映射
# - 典型用法：
#   1) 左右/上下颠倒：改 invert_x 或 invert_y
#   2) X/Y 互相串了：改 swap_axes
#   3) 点击边缘不准/范围偏了：打开 use_calibration 并填写 min/max
ui.touch.enabled=true
ui.touch.device=auto
# 交换触摸原始 X/Y 轴
ui.touch.swap_axes=false
# 左右镜像触摸 X 轴
ui.touch.invert_x=false
# 上下镜像触摸 Y 轴
ui.touch.invert_y=false
# 是否强制使用手工校准量程；false=自动读取设备量程
ui.touch.use_calibration=false
# 仅在 use_calibration=true 时生效
# ui.touch.min_x=0
# ui.touch.max_x=799
# ui.touch.min_y=0
# ui.touch.max_y=479
